<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
  <title>WetinDey offline</title>
  <!--
    This page is the last resort, not the offline experience.

    The service worker only serves it when a navigation cannot be answered from
    the network AND there is no cached document — i.e. the very first visit was
    offline, or storage was cleared. Anyone who has opened the app once gets the
    cached shell instead. So this page's job is small and specific: say what is
    true, account for anything the user typed that has not been sent yet, and
    get out of the way the moment the network returns.

    It is a static file outside the React tree, so it cannot use the Tailwind
    tokens or the squircle paint worklet. The literals below are transcribed
    from --color-* in src/app/globals.css and must be kept in step by hand; the
    radii match .squircle-card and degrade to a plain rounded rect, exactly as
    the app does on browsers without the worklet.
  -->
  <script>
    /*
      Resolve the theme before first paint, mirroring the blocking script in
      layout.tsx. Same origin, so the same localStorage key is readable here.
      Without this, a dark-mode user who loses their connection gets a white
      flash — the one moment the app is least able to explain itself.
    */
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var r = document.documentElement;
        r.classList.toggle('dark', t === 'dark');
        r.style.colorScheme = t;
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --background: #F2F2F7;
      --surface: #FFFFFF;
      --text-primary: #000000;
      --text-secondary: rgba(60, 60, 67, 0.60);
      --fill-tertiary: rgba(118, 118, 128, 0.12);
      --accent: #000000;
      --accent-pressed: #333333;
      --accent-contrast: #FFFFFF;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    html.dark {
      --background: #000000;
      --surface: #1C1C1E;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(235, 235, 245, 0.60);
      --fill-tertiary: rgba(118, 118, 128, 0.24);
      --accent: #FFFFFF;
      --accent-pressed: #D1D1D6;
      --accent-contrast: #000000;
      /* A shadow is invisible on black, so elevation in dark comes from the
         surface being lighter than the background, not from a cast shadow. */
      --shadow: none;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1.5rem;
      background-color: var(--background);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .card {
      background-color: var(--surface);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 1.75rem 1.5rem;
      width: 100%;
      max-width: 22rem;
    }

    h1 {
      font-size: 1.375rem;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 0.5rem;
    }

    p {
      font-size: 0.9375rem;
      line-height: 1.4;
      color: var(--text-secondary);
      margin: 0;
    }

    /*
      Separation by fill, never by a rule. The pending block is a sunken well
      inside the card; the card is a raised surface on the background.
    */
    .pending {
      display: none;
      background-color: var(--fill-tertiary);
      border-radius: 16px;
      padding: 0.875rem 1rem;
      margin-top: 1.25rem;
    }
    .pending[data-has-queue="true"] { display: block; }

    .pending strong {
      display: block;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.125rem;
    }
    .pending span {
      font-size: 0.8125rem;
      line-height: 1.35;
      color: var(--text-secondary);
    }

    button {
      appearance: none;
      background-color: var(--accent);
      color: var(--accent-contrast);
      border: 0;
      border-radius: 12px;
      min-height: 44px;
      padding: 0 1.5rem;
      margin-top: 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 150ms ease;
    }
    button:active { background-color: var(--accent-pressed); }
  </style>
</head>
<body>
  <div class="card">
    <h1>You dey offline</h1>
    <p>We never get live local information for this phone yet. Once network come back, the map go load and e go work offline after that.</p>

    <div class="pending" id="pending">
      <strong id="pending-count"></strong>
      <span>Dem dey your phone.</span>
    </div>

    <button id="retry" type="button">Try again</button>
  </div>

  <script>
    (function () {
      /*
        The one piece of real state this page can honestly show.

        `pending_observations` is a legacy same-origin localStorage queue. No
        current code writes it, and the app's contribution containment policy
        deliberately has no offline drain, so this page may only state the one
        thing that is true: the bytes are still on the phone. It must not
        promise sending. Nothing here mutates the queue either; those bytes
        stay untouched until durable server idempotency exists.
      */
      try {
        var raw = localStorage.getItem('pending_observations');
        var queue = raw ? JSON.parse(raw) : [];
        if (Array.isArray(queue) && queue.length > 0) {
          var el = document.getElementById('pending');
          document.getElementById('pending-count').textContent =
            queue.length === 1 ? '1 local report dey wait' : queue.length + ' local reports dey wait';
          el.setAttribute('data-has-queue', 'true');
        }
      } catch (e) {
        /* Corrupt JSON or a privacy mode that throws. The queue is a bonus
           here; it is never worth failing the page the user is already
           looking at because their connection failed. */
      }

      document.getElementById('retry').addEventListener('click', function () {
        window.location.replace('/');
      });

      /*
        Reconnect without asking. This page has nothing worth preserving, and on
        an intermittent link the moment the network returns is often shorter
        than the time it takes to notice a button.
      */
      window.addEventListener('online', function () {
        window.location.replace('/');
      });
    })();
  </script>
</body>
</html>
