name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to the same branch cancels the first; nothing here is worth
# paying for twice.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-static:
    name: Stage A / static contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          cache: npm

      # `npm ci` over `npm install`: it installs exactly what the lockfile pins and
      # fails if package.json and the lock have drifted, rather than silently fixing it.
      - name: Install
        run: npm ci

      - name: Static stage
        run: npm run quality:stage:static

  quality-typecheck:
    name: Stage A / typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck stage
        run: npm run quality:stage:typecheck

  quality-dependencies:
    name: Stage A / dependency hygiene
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency stage
        run: npm run quality:stage:dependencies
